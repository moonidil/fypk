# docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: koda
      POSTGRES_PASSWORD: kodapassword
      POSTGRES_DB: kodadb
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: